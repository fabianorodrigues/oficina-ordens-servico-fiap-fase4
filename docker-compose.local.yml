name: oficina-fiap-fase4-local

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA}
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "127.0.0.1:${SQLSERVER_PORT}:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/1433' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    networks:
      - oficina-local

  sql-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
      CADASTRO_DB_PASSWORD: ${CADASTRO_DB_PASSWORD}
      ESTOQUE_DB_PASSWORD: ${ESTOQUE_DB_PASSWORD}
      ORDENS_DB_PASSWORD: ${ORDENS_DB_PASSWORD}
      E2E_DB_PASSWORD: ${E2E_DB_PASSWORD}
    volumes:
      - ./docker/sql-init:/scripts:ro
    command: ["/bin/bash", "/scripts/init-sql.sh"]
    networks:
      - oficina-local
    restart: "no"

  payment-mock:
    image: wiremock/wiremock:3.9.1
    command: ["--global-response-templating", "--verbose"]
    ports:
      - "127.0.0.1:${WIREMOCK_HTTP_PORT}:8080"
    volumes:
      - ./docker/wiremock:/home/wiremock:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/__admin/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - oficina-local

  localstack:
    image: localstack/localstack:3.7
    environment:
      SERVICES: sqs
      AWS_DEFAULT_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    ports:
      - "127.0.0.1:${LOCALSTACK_HTTP_PORT}:4566"
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4566/_localstack/health | grep -q 'sqs' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks:
      - oficina-local

  localstack-init:
    image: amazon/aws-cli:2.17.58
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      LOCALSTACK_ENDPOINT: http://localstack:4566
    volumes:
      - ./docker/localstack:/scripts:ro
    entrypoint: ["/bin/sh", "/scripts/init-queues.sh"]
    networks:
      - oficina-local
    restart: "no"

  cadastro-api:
    build:
      context: ../oficina-cadastro-fiap-fase4
      dockerfile: docker/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Authentication__Mode: ${AUTHENTICATION_MODE}
      Database__ApplyMigrations: ${DATABASE_APPLY_MIGRATIONS}
      ConnectionStrings__OficinaCadastroDb: Server=sqlserver,1433;Database=OficinaCadastroDb;User Id=oficina_cadastro_app;Password=${CADASTRO_DB_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true
      OpenTelemetry__Enabled: "false"
    ports:
      - "127.0.0.1:${CADASTRO_HTTP_PORT}:8080"
    depends_on:
      sql-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks:
      - oficina-local

  estoque-api:
    build:
      context: ../oficina-estoque-fiap-fase4
      dockerfile: docker/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Authentication__Mode: ${AUTHENTICATION_MODE}
      Database__ApplyMigrations: ${DATABASE_APPLY_MIGRATIONS}
      ConnectionStrings__OficinaEstoqueDb: Server=sqlserver,1433;Database=OficinaEstoqueDb;User Id=oficina_estoque_app;Password=${ESTOQUE_DB_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true
      OpenTelemetry__Enabled: "false"
      Messaging__Sqs__Enabled: ${MESSAGING_SQS_ENABLED}
      Messaging__Sqs__ServiceUrl: http://localstack:4566
      Messaging__Sqs__Region: ${AWS_REGION}
      Messaging__Sqs__AccessKey: ${AWS_ACCESS_KEY_ID}
      Messaging__Sqs__SecretKey: ${AWS_SECRET_ACCESS_KEY}
      Messaging__Sqs__CommandsQueueName: oficina-estoque-comandos.fifo
      Messaging__Sqs__CommandsDlqQueueName: oficina-estoque-comandos-dlq.fifo
      Messaging__Sqs__EventsQueueName: oficina-ordens-eventos.fifo
    ports:
      - "127.0.0.1:${ESTOQUE_HTTP_PORT}:8080"
    depends_on:
      sql-init:
        condition: service_completed_successfully
      localstack-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks:
      - oficina-local

  ordens-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Authentication__Mode: ${AUTHENTICATION_MODE}
      Database__ApplyMigrations: ${DATABASE_APPLY_MIGRATIONS}
      ConnectionStrings__OficinaOrdensServicoDb: Server=sqlserver,1433;Database=OficinaOrdensServicoDb;User Id=oficina_ordens_app;Password=${ORDENS_DB_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true
      Integrations__Cadastro__BaseUrl: http://cadastro-api:8080
      Integrations__Estoque__BaseUrl: http://estoque-api:8080
      Payments__BaseUrl: http://payment-mock:8080
      Payments__Mode: Api
      Payments__TimeoutSeconds: "5"
      Payments__Scenario: ${PAYMENTS_SCENARIO:-aprovado}
      DistributedFlow__Enabled: "true"
      OpenTelemetry__Enabled: "false"
      Messaging__Sqs__Enabled: ${MESSAGING_SQS_ENABLED}
      Messaging__Sqs__ServiceUrl: http://localstack:4566
      Messaging__Sqs__Region: ${AWS_REGION}
      Messaging__Sqs__AccessKey: ${AWS_ACCESS_KEY_ID}
      Messaging__Sqs__SecretKey: ${AWS_SECRET_ACCESS_KEY}
      Messaging__Sqs__EventsQueueName: oficina-ordens-eventos.fifo
      Messaging__Sqs__EventsDlqQueueName: oficina-ordens-eventos-dlq.fifo
      Messaging__Sqs__CommandsQueueName: oficina-estoque-comandos.fifo
    ports:
      - "127.0.0.1:${ORDENS_HTTP_PORT}:8080"
    depends_on:
      cadastro-api:
        condition: service_healthy
      estoque-api:
        condition: service_healthy
      payment-mock:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 18
    networks:
      - oficina-local

  e2e-tests:
    profiles: ["tests"]
    build:
      context: .
      dockerfile: docker/Dockerfile.e2e
    environment:
      RUN_E2E: "true"
      CADASTRO_BASE_URL: http://cadastro-api:8080
      ESTOQUE_BASE_URL: http://estoque-api:8080
      ORDENS_BASE_URL: http://ordens-api:8080
      PAYMENT_MOCK_BASE_URL: http://payment-mock:8080
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      SQS_SERVICE_URL: http://localstack:4566
      SQL_CADASTRO: Server=sqlserver,1433;Database=OficinaCadastroDb;User Id=oficina_e2e_harness;Password=${E2E_DB_PASSWORD};TrustServerCertificate=True
      SQL_ESTOQUE: Server=sqlserver,1433;Database=OficinaEstoqueDb;User Id=oficina_e2e_harness;Password=${E2E_DB_PASSWORD};TrustServerCertificate=True
      SQL_ORDENS: Server=sqlserver,1433;Database=OficinaOrdensServicoDb;User Id=oficina_e2e_harness;Password=${E2E_DB_PASSWORD};TrustServerCertificate=True
    depends_on:
      cadastro-api:
        condition: service_healthy
      estoque-api:
        condition: service_healthy
      ordens-api:
        condition: service_healthy
      payment-mock:
        condition: service_healthy
      localstack-init:
        condition: service_completed_successfully
    networks:
      - oficina-local

networks:
  oficina-local:
    driver: bridge

volumes:
  sqlserver-data:
  localstack-data:
