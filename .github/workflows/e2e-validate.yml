name: E2E Validate

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type VALIDATE to run the end-to-end suite against Docker Compose."
        required: true

permissions:
  contents: read

concurrency:
  group: e2e-validate
  cancel-in-progress: false

jobs:
  validate:
    name: End-to-end suite (Docker Compose)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Validate confirmation
        run: test "${{ inputs.confirmation }}" = "VALIDATE"

      # The suite exercises Cadastro, Estoque and Ordens together, so the three
      # repositories are checked out as siblings, matching the relative build
      # contexts already declared in docker-compose.local.yml.
      - name: Checkout Ordens
        uses: actions/checkout@v4
        with:
          path: oficina-ordens-servico-fiap-fase4

      - name: Checkout Cadastro
        uses: actions/checkout@v4
        with:
          repository: fabianorodrigues/oficina-cadastro-fiap-fase4
          ref: main
          path: oficina-cadastro-fiap-fase4

      - name: Checkout Estoque
        uses: actions/checkout@v4
        with:
          repository: fabianorodrigues/oficina-estoque-fiap-fase4
          ref: main
          path: oficina-estoque-fiap-fase4

      - name: Prepare local environment file
        working-directory: oficina-ordens-servico-fiap-fase4
        run: cp .env.local.example .env.local

      # LocalStack and the local SQL Server container simulate SQS FIFO/DLQ and
      # the databases; no real AWS resource is created, read or modified.
      - name: Run end-to-end suite
        working-directory: oficina-ordens-servico-fiap-fase4
        run: docker compose -f docker-compose.local.yml --env-file .env.local --profile tests up --build --abort-on-container-exit --exit-code-from e2e-tests

      - name: Collect logs on failure
        if: failure()
        working-directory: oficina-ordens-servico-fiap-fase4
        run: docker compose -f docker-compose.local.yml --env-file .env.local logs --no-color --tail=200 || true

      - name: Stop stack
        if: always()
        working-directory: oficina-ordens-servico-fiap-fase4
        run: docker compose -f docker-compose.local.yml --env-file .env.local down

      - name: Summary
        if: always()
        run: |
          {
            echo '### E2E Validate'
            echo
            echo 'Fluxo principal, saldo insuficiente, pagamento recusado e mensagem fora de ordem validados via Docker Compose (Cadastro, Estoque, Ordens, WireMock, LocalStack).'
            echo 'Pagamento mock aprovado e compensacao mock validados. Nenhum recurso AWS real foi acessado.'
          } >> "$GITHUB_STEP_SUMMARY"
