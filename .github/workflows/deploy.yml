name: Ordens Deploy

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DEPLOY to continue
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ordens-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Ordens
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate request
        run: |
          test "${GITHUB_REF}" = "refs/heads/main"
          test "${{ inputs.confirmation }}" = "DEPLOY"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Validate configuration
        shell: pwsh
        run: |
          ./scripts/validate-official-config.ps1
          ./scripts/validate-payment-integration.ps1

      - name: Validate region
        run: test -n "${{ vars.AWS_REGION }}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Read AWS metadata
        id: meta
        run: |
          set -euo pipefail
          aws sts get-caller-identity >/dev/null
          CLUSTER=$(aws ssm get-parameter --name /oficina/infra/cluster/name --region "${{ vars.AWS_REGION }}" --query Parameter.Value --output text)
          NAMESPACE=$(aws ssm get-parameter --name /oficina/infra/cluster/namespace --region "${{ vars.AWS_REGION }}" --query Parameter.Value --output text)
          ECR=$(aws ssm get-parameter --name /oficina/infra/ecr/ordens --region "${{ vars.AWS_REGION }}" --query Parameter.Value --output text)
          COMMANDS=$(aws ssm get-parameter --name /oficina/infra/sqs/estoque-comandos/url --region "${{ vars.AWS_REGION }}" --query Parameter.Value --output text)
          COMMANDS_DLQ=$(aws ssm get-parameter --name /oficina/infra/sqs/estoque-comandos-dlq/url --region "${{ vars.AWS_REGION }}" --query Parameter.Value --output text)
          EVENTS=$(aws ssm get-parameter --name /oficina/infra/sqs/ordens-eventos/url --region "${{ vars.AWS_REGION }}" --query Parameter.Value --output text)
          EVENTS_DLQ=$(aws ssm get-parameter --name /oficina/infra/sqs/ordens-eventos-dlq/url --region "${{ vars.AWS_REGION }}" --query Parameter.Value --output text)
          aws secretsmanager describe-secret --secret-id /oficina/ordens/runtime-db >/dev/null
          aws secretsmanager describe-secret --secret-id /oficina/ordens/migration-db >/dev/null
          aws secretsmanager list-secret-version-ids --secret-id /oficina/ordens/runtime-db --include-deprecated --query "Versions[?contains(VersionStages, \`AWSCURRENT\`)] | length(@)" --output text | grep -q '^1$'
          aws secretsmanager list-secret-version-ids --secret-id /oficina/ordens/migration-db --include-deprecated --query "Versions[?contains(VersionStages, \`AWSCURRENT\`)] | length(@)" --output text | grep -q '^1$'
          aws sqs get-queue-attributes --queue-url "$COMMANDS" --region "${{ vars.AWS_REGION }}" --attribute-names FifoQueue RedrivePolicy VisibilityTimeout --query 'Attributes.FifoQueue' --output text | grep -q '^true$'
          aws sqs get-queue-attributes --queue-url "$COMMANDS_DLQ" --region "${{ vars.AWS_REGION }}" --attribute-names FifoQueue --query 'Attributes.FifoQueue' --output text | grep -q '^true$'
          aws sqs get-queue-attributes --queue-url "$EVENTS" --region "${{ vars.AWS_REGION }}" --attribute-names FifoQueue RedrivePolicy VisibilityTimeout --query 'Attributes.FifoQueue' --output text | grep -q '^true$'
          aws sqs get-queue-attributes --queue-url "$EVENTS_DLQ" --region "${{ vars.AWS_REGION }}" --attribute-names FifoQueue --query 'Attributes.FifoQueue' --output text | grep -q '^true$'
          echo "cluster=$CLUSTER" >> "$GITHUB_OUTPUT"
          echo "namespace=$NAMESPACE" >> "$GITHUB_OUTPUT"
          echo "ecr=$ECR" >> "$GITHUB_OUTPUT"
          echo "runtime_image=$ECR:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "migration_image=$ECR:${GITHUB_SHA}-migration" >> "$GITHUB_OUTPUT"
          echo "migration_job=oficina-ordens-servico-migration-${{ github.run_id }}-${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"
          echo "commands=$COMMANDS" >> "$GITHUB_OUTPUT"
          echo "commands_dlq=$COMMANDS_DLQ" >> "$GITHUB_OUTPUT"
          echo "events=$EVENTS" >> "$GITHUB_OUTPUT"
          echo "events_dlq=$EVENTS_DLQ" >> "$GITHUB_OUTPUT"

      - name: Build solution
        run: |
          dotnet restore Oficina.OrdensServico.sln
          dotnet build Oficina.OrdensServico.sln -c Release --no-restore
          dotnet test Oficina.OrdensServico.sln -c Release --no-build

      - name: Login ECR
        uses: aws-actions/amazon-ecr-login@v3

      - name: Build images
        run: |
          docker build -f Dockerfile -t "${{ steps.meta.outputs.runtime_image }}" .
          docker build -f Dockerfile.migration -t "${{ steps.meta.outputs.migration_image }}" .

      - name: Scan images
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.meta.outputs.runtime_image }}
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Scan migration image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ steps.meta.outputs.migration_image }}
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Push images
        run: |
          docker push "${{ steps.meta.outputs.runtime_image }}"
          docker push "${{ steps.meta.outputs.migration_image }}"

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "${{ steps.meta.outputs.cluster }}" --region "${{ vars.AWS_REGION }}"

      - name: Render manifests
        shell: pwsh
        run: >
          ./scripts/render-k8s-manifests.ps1
          -OutputDirectory artifacts/k8s
          -RuntimeImage "${{ steps.meta.outputs.runtime_image }}"
          -MigrationImage "${{ steps.meta.outputs.migration_image }}"
          -AwsRegion "${{ vars.AWS_REGION }}"
          -CommandsQueueUrl "${{ steps.meta.outputs.commands }}"
          -CommandsDlqUrl "${{ steps.meta.outputs.commands_dlq }}"
          -EventsQueueUrl "${{ steps.meta.outputs.events }}"
          -EventsDlqUrl "${{ steps.meta.outputs.events_dlq }}"
          -MigrationJobName "${{ steps.meta.outputs.migration_job }}"

      - name: Validate payment flags
        shell: pwsh
        run: |
          $config = Get-Content -LiteralPath 'artifacts/k8s/configmap.yaml' -Raw
          foreach ($line in @(
            'Payments__UseMock: "true"',
            'Payments__MockBehavior: "Approved"',
            'Payments__ExternalApiEnabled: "false"',
            'Payments__ExternalWebhookEnabled: "false"'
          )) {
            if ($config -notmatch [regex]::Escape($line)) {
              throw "Payment flag not found in ConfigMap: $line"
            }
          }

      - name: Apply dependencies
        run: |
          kubectl get namespace "${{ steps.meta.outputs.namespace }}"
          kubectl apply -f artifacts/k8s/service-account-runtime.yaml
          kubectl apply -f artifacts/k8s/service-account-migration.yaml
          kubectl apply -f artifacts/k8s/secret-provider-class-runtime.yaml
          kubectl apply -f artifacts/k8s/secret-provider-class-migration.yaml
          kubectl apply -f artifacts/k8s/configmap.yaml
          kubectl apply -f artifacts/k8s/service.yaml

      - name: Run migration
        run: |
          kubectl apply -f artifacts/k8s/migration-job.yaml
          kubectl wait --for=condition=complete --timeout=900s "job/${{ steps.meta.outputs.migration_job }}" -n "${{ steps.meta.outputs.namespace }}"
          kubectl logs "job/${{ steps.meta.outputs.migration_job }}" -n "${{ steps.meta.outputs.namespace }}" --tail=200

      - name: Deploy workload
        run: |
          kubectl apply -f artifacts/k8s/deployment.yaml
          kubectl rollout status deployment/oficina-ordens-servico -n "${{ steps.meta.outputs.namespace }}" --timeout=600s

      - name: Validate health
        shell: bash
        run: |
          set -euo pipefail
          kubectl port-forward service/oficina-ordens-servico 18080:80 -n "${{ steps.meta.outputs.namespace }}" >/tmp/ordens-port-forward.log 2>&1 &
          pf_pid=$!
          trap 'kill $pf_pid || true' EXIT
          sleep 5
          pwsh ./scripts/smoke-test.ps1 -BaseUrl http://localhost:18080
          pwsh ./scripts/validate-ordens-deployment.ps1 -Namespace "${{ steps.meta.outputs.namespace }}" -ExpectedImageTag "${{ github.sha }}" -MigrationJobName "${{ steps.meta.outputs.migration_job }}"

      - name: Publish summary
        run: |
          {
            echo "Commit SHA: ${GITHUB_SHA}"
            echo "Runtime image tag: ${GITHUB_SHA}"
            echo "Migration image tag: ${GITHUB_SHA}-migration"
            echo "Cluster: ${{ steps.meta.outputs.cluster }}"
            echo "Namespace: ${{ steps.meta.outputs.namespace }}"
            echo "Migration Job: ${{ steps.meta.outputs.migration_job }}"
            echo "Payment provider: Mock"
            echo "Mock behavior: Approved"
            echo "External API: Disabled"
            echo "External webhook: Disabled"
            echo "Contract: Pending"
            echo "Health: /health"
            echo "Readiness: /ready"
          } >> "$GITHUB_STEP_SUMMARY"
