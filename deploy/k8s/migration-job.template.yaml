apiVersion: batch/v1
kind: Job
metadata:
  name: __MIGRATION_JOB_NAME__
  namespace: oficina
  labels:
    app.kubernetes.io/name: oficina-ordens-servico
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 1800
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oficina-ordens-servico
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      serviceAccountName: ordens-migrator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migration
          image: __MIGRATION_IMAGE__
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              connection_file="/mnt/secrets-store/ConnectionStrings__DefaultConnection"
              if [ ! -s "$connection_file" ]; then
                echo "Migration connection string file was not mounted."
                exit 1
              fi
              exec ./ordens-migration-bundle --connection "$(cat "$connection_file")"
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: ordens-migration-db
