apiVersion: batch/v1
kind: Job
metadata:
  name: __MIGRATION_JOB_NAME__
  namespace: oficina
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: ordens-migrator
      containers:
        - name: migration
          image: __MIGRATION_IMAGE__
          imagePullPolicy: IfNotPresent
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: ordens-migration-db
