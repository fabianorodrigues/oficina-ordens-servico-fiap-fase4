apiVersion: apps/v1
kind: Deployment
metadata:
  name: oficina-ordens-servico
  namespace: oficina
spec:
  replicas: 1
  strategy:
    type: Recreate
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: oficina-ordens-servico
  template:
    metadata:
      labels:
        app: oficina-ordens-servico
    spec:
      serviceAccountName: ordens-runtime
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: __RUNTIME_IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: oficina-ordens-servico-config
          volumeMounts:
            - name: secrets-store
              mountPath: /mnt/secrets-store
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: ordens-runtime-db
